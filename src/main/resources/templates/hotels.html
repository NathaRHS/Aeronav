<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des hotels</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div th:replace="fragments/header :: appHeader"></div>
    <div class="container">
        <div class="page-header">
            <h1>Gestion des hotels</h1>
            <p class="subtitle">Creer, modifier et supprimer les etablissements.</p>
        </div>

        <div class="card">
            <h2>Ajouter ou modifier un hotel</h2>
            <form id="hotelForm">
                <div class="field">
                    <label for="nom">Nom de l'hotel *</label>
                    <input type="text" id="nom" name="nom" required placeholder="Ex : Hotel Resort Paris">
                </div>
                <div class="field">
                    <label for="adresse">Adresse *</label>
                    <textarea id="adresse" name="adresse" required placeholder="Adresse complete" rows="3"></textarea>
                </div>
                <div class="field">
                    <label for="distanceFromAeroport">Distance de l'aeroport (km) *</label>
                    <input type="number" id="distanceFromAeroport" name="distanceFromAeroport" required min="0" step="0.1">
                </div>
                <div class="form-actions">
                    <button type="submit">Enregistrer l'hotel</button>
                    <button type="button" class="btn-secondary" onclick="resetForm()">Reinitialiser</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>Liste des hotels</h2>
            <div id="hotelsList">
                <p class="subtitle">Chargement...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/hotels';

        window.addEventListener('load', loadHotels);

        function loadHotels() {
            fetch(API_URL)
                .then(response => response.json())
                .then(hotels => displayHotels(hotels))
                .catch(error => console.error('Erreur:', error));
        }

        function displayHotels(hotels) {
            const list = document.getElementById('hotelsList');
            if (hotels.length === 0) {
                list.innerHTML = '<div class="empty">Aucun hotel enregistre.</div>';
                return;
            }

            let html = '<table><thead><tr><th>Nom</th><th>Adresse</th><th>Distance aeroport (km)</th><th>Actions</th></tr></thead><tbody>';
            hotels.forEach(h => {
                html += `
                    <tr>
                        <td><strong>${h.nom}</strong></td>
                        <td>${h.adresse}</td>
                        <td>${h.distanceFromAeroport}</td>
                        <td class="actions">
                            <button class="btn-edit" onclick="editHotel(${h.idHotel})">Modifier</button>
                            <button class="btn-delete" onclick="deleteHotel(${h.idHotel})">Supprimer</button>
                        </td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            list.innerHTML = html;
        }

        document.getElementById('hotelForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = {
                nom: document.getElementById('nom').value,
                adresse: document.getElementById('adresse').value,
                distanceFromAeroport: parseFloat(document.getElementById('distanceFromAeroport').value)
            };

            const id = document.getElementById('hotelForm').dataset.hotelId;
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => {
                if (response.ok) {
                    alert('Hotel enregistre avec succes.');
                    resetForm();
                    loadHotels();
                } else {
                    alert('Erreur lors de l\'enregistrement.');
                }
            })
            .catch(error => console.error('Erreur:', error));
        });

        function editHotel(id) {
            fetch(`${API_URL}/${id}`)
                .then(response => response.json())
                .then(hotel => {
                    document.getElementById('nom').value = hotel.nom;
                    document.getElementById('adresse').value = hotel.adresse;
                    document.getElementById('distanceFromAeroport').value = hotel.distanceFromAeroport;
                    document.getElementById('hotelForm').dataset.hotelId = id;
                    document.querySelector('button[type="submit"]').textContent = 'Mettre a jour l\'hotel';
                })
                .catch(error => console.error('Erreur:', error));
        }

        function deleteHotel(id) {
            if (confirm('Etes-vous sur de vouloir supprimer cet hotel ?')) {
                fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                })
                .then(response => {
                    if (response.ok) {
                        alert('Hotel supprime.');
                        loadHotels();
                    } else {
                        alert('Erreur lors de la suppression.');
                    }
                })
                .catch(error => console.error('Erreur:', error));
            }
        }

        function resetForm() {
            document.getElementById('hotelForm').reset();
            delete document.getElementById('hotelForm').dataset.hotelId;
            document.querySelector('button[type="submit"]').textContent = 'Enregistrer l\'hotel';
        }
    </script>
</body>
</html>
