<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - Gestion hotel</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <style>
        :root {
            --text: #111111;
            --muted: #6b7280;
            --border: #e5e7eb;
            --hover: #f5f5f7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .container {
            text-align: center;
            max-width: 720px;
            width: 100%;
        }
        .brand-logo {
            height: 200px;
            width: auto;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 40px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }
        .lead {
            font-size: 17px;
            color: var(--muted);
            margin-bottom: 32px;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            border: 1px solid var(--text);
            background: var(--text);
            color: #fff;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .btn:hover { background: #000; }
        .btn-secondary {
            background: #fff;
            color: var(--text);
        }
        .btn-secondary:hover { background: var(--hover); }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 56px;
            text-align: left;
        }
        .feature {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .feature h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .feature p {
            font-size: 14px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/img/logo.png" alt="AeroNav" class="brand-logo">
        <h1>Gestion hoteliere</h1>
        <p class="lead">Systeme integre pour les hotels, les reservations et les vehicules.</p>

        <div class="actions">
            <a href="/reservations/creation" class="btn">Acceder au tableau de bord</a>
            <a href="/documentation" class="btn btn-secondary">Lire la documentation</a>
        </div>

        <div class="features">
            <div class="feature">
                <h3>Reservations</h3>
                <p>Gerez toutes les reservations de vos clients.</p>
            </div>
            <div class="feature">
                <h3>Hotels</h3>
                <p>Administrez vos etablissements.</p>
            </div>
            <div class="feature">
                <h3>Vehicules</h3>
                <p>Optimisez votre flotte de transport.</p>
            </div>
        </div>
    </div>
</body>
</html>
