# Java Logging Configuration
# Désactiver les logs Hibernate et Spring

handlers= java.util.logging.ConsoleHandler

# Set the default logging level for all loggers
.level=SEVERE

# Désactiver spécifiquement les packages verbose
org.hibernate.level=OFF
org.hibernate.jpa.level=OFF
org.hibernate.engine.level=OFF
org.springframework.level=OFF
org.springframework.orm.level=OFF

# Console handler configuration
java.util.logging.ConsoleHandler.level=SEVERE
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
