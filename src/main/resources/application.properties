# Configuration du serveur
# En local : 8082. En production (Railway), le port est injecte via $PORT.
server.port=${PORT:8082}
server.servlet.context-path=/
spring.application.name=hotel-management

# Configuration JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Charger automatiquement import.sql après création des tables


# Configuration MySQL
# Valeurs par defaut = local. En production, surchargees par les variables d'env
# SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/reservationnavettejpa?allowPublicKeyRetrieval=true&useSSL=false&connectionTimeZone=SERVER&forceConnectionTimeZoneToSession=true&allowLoadLocalInfile=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tiger}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Configuration Logging
logging.level.root=INFO
logging.level.com.example.app=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# CORS Configuration
server.compression.enabled=true
server.compression.min-response-size=1024

# Upload Files
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


